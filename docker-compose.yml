services:
  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles/  # CHANGE LE PATH ICI
      - media_volume:/app/media/
    env_file:
      - .env.prod
      - .env
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles/  # MÊME PATH QUE LE WEB
      - media_volume:/app/media/
    depends_on:
      - web
    restart: always

volumes:
  static_volume:
  media_volume:
  
        
      
 